version: "3.8"
services:
  db_test:
    image: timescale/timescaledb:latest-pg16
    container_name: ep_db_test
    environment:
      POSTGRES_USER: epuser
      POSTGRES_PASSWORD: eppass
      POSTGRES_DB: energypulse_test
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U epuser"]
      interval: 10s
      timeout: 5s
      retries: 5

  app_test:
    build:
      context: ./services/app
      dockerfile: Dockerfile
    container_name: ep_app_test
    environment:
      - DATABASE_URL=postgresql://epuser:eppass@db_test:5432/energypulse_test
      - ENV=test
    volumes:
      - ./services/app:/app
      - /app/__pycache__
    depends_on:
      db_test:
        condition: service_healthy

  web_test:
    build:
      context: ./services/web
      dockerfile: Dockerfile
    container_name: ep_web_test
    environment:
      - DATABASE_URL=postgresql://epuser:eppass@db_test:5432/energypulse_test
      - ENV=test
    ports:
      - "8080:5000"
    volumes:
      - ./services/web:/app
    depends_on:
      - db_test

volumes:
  postgres_test_data:
